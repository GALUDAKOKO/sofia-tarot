<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>โซเฟีย — หมอดูไพ่ทาโรต์</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--gold:#c9a84c;--gold2:#e8c97a;--purple:#2d1b4e;--dark:#0a0612;--purple2:#4a2d7a;--text:#f0e6d3;--muted:#9a8a7a;}
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Sarabun:wght@300;400;600&display=swap');
html,body{overflow-x:hidden}
body{background:var(--dark);color:var(--text);font-family:'Sarabun',sans-serif;min-height:100vh}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 20% 20%,#1a0a2e 0%,transparent 50%),radial-gradient(ellipse at 80% 80%,#0a1a2e 0%,transparent 50%),var(--dark);z-index:-2}
body::after{content:'';position:fixed;inset:0;background-image:radial-gradient(1px 1px at 10% 15%,rgba(255,255,255,.6),transparent),radial-gradient(1px 1px at 30% 45%,rgba(255,255,255,.4),transparent),radial-gradient(1px 1px at 60% 10%,rgba(255,255,255,.5),transparent),radial-gradient(1px 1px at 80% 30%,rgba(255,255,255,.3),transparent),radial-gradient(2px 2px at 70% 50%,rgba(201,168,76,.4),transparent),radial-gradient(2px 2px at 35% 25%,rgba(201,168,76,.3),transparent);z-index:-1;animation:twinkle 4s ease-in-out infinite alternate}
@keyframes twinkle{0%{opacity:.7}100%{opacity:1}}
.app{min-height:100vh;display:flex;flex-direction:column}
.header{text-align:center;padding:1.5rem 1rem .5rem}
.header h1{font-size:clamp(1.5rem,3vw,2.4rem);color:var(--gold);font-family:'Cinzel',serif;text-shadow:0 0 20px rgba(201,168,76,.5);letter-spacing:.1em}
.header p{color:var(--muted);font-size:.85rem;margin-top:.3rem}
.divider{height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:.6rem auto;max-width:400px}

/* ── Sofia 3x ── */
.sofia-row{display:flex;justify-content:center;align-items:flex-start;gap:1.5rem;padding:.8rem 1rem;flex-wrap:wrap}
.sofia-frame{position:relative;flex-shrink:0}
.sofia-glow{position:absolute;inset:-4px;border-radius:14px;background:linear-gradient(45deg,var(--gold),var(--purple2),var(--gold));opacity:.4;filter:blur(8px);z-index:-1;animation:pglow 3s ease-in-out infinite}
@keyframes pglow{0%,100%{opacity:.3}50%{opacity:.65}}
.sofia-media{width:240px;height:324px;object-fit:cover;border-radius:12px;border:2px solid var(--gold);display:block}
.sofia-name{text-align:center;color:var(--gold);font-size:.8rem;font-family:'Cinzel',serif;margin-top:.4rem;letter-spacing:.08em}
.unmute-btn{display:block;margin:.3rem auto 0;font-size:.72rem;padding:.2rem .6rem;border:1px solid rgba(201,168,76,.4);border-radius:10px;background:rgba(201,168,76,.08);color:var(--gold);cursor:pointer;font-family:'Sarabun',sans-serif}
.speech{flex:1;min-width:220px;max-width:520px;background:rgba(45,27,78,.55);border:1px solid rgba(201,168,76,.3);border-radius:14px;padding:1rem 1.2rem;position:relative;backdrop-filter:blur(6px)}
.speech::before{content:'';position:absolute;left:-10px;top:28px;border:6px solid transparent;border-right-color:rgba(201,168,76,.3)}
.speech-name{color:var(--gold);font-size:.76rem;margin-bottom:.35rem;font-family:'Cinzel',serif}
.speech-text{font-size:.95rem;line-height:1.7}
.steps{display:flex;justify-content:center;gap:.4rem;margin:.5rem 0;flex-wrap:wrap}
.step{display:flex;align-items:center;gap:.25rem;font-size:.72rem;color:var(--muted)}
.step.active{color:var(--gold)}.step.done{color:#6a9a6a}
.step-dot{width:7px;height:7px;border-radius:50%;background:currentColor;flex-shrink:0}
.step-line{width:16px;height:1px;background:rgba(255,255,255,.15)}
.btn{padding:.55rem 1.2rem;border-radius:8px;border:1px solid var(--gold);background:rgba(201,168,76,.08);color:var(--gold);cursor:pointer;font-family:'Sarabun',sans-serif;font-size:.88rem;transition:all .25s;font-weight:600}
.btn:hover{background:rgba(201,168,76,.22);box-shadow:0 0 10px rgba(201,168,76,.25)}
.btn-primary{background:linear-gradient(135deg,var(--purple2),#6a3da0);color:#fff;border-color:var(--gold2)}
.btn-primary:hover{background:linear-gradient(135deg,#5a2d8a,#7a4db0)}
.btn-sm{padding:.35rem .8rem;font-size:.78rem}
.btn-danger{border-color:#e06060;color:#e06060}.btn-danger:hover{background:rgba(224,96,96,.15)}
.btn-export{border-color:#4a9a6a;color:#4a9a6a}.btn-export:hover{background:rgba(74,154,106,.15)}
.btn-flip{border-color:#9a70e0;color:#9a70e0}.btn-flip:hover{background:rgba(154,112,224,.15)}
.btn-auto{border-color:#70b0e0;color:#70b0e0}.btn-auto:hover{background:rgba(112,176,224,.15)}
.action-row{display:flex;gap:.5rem;flex-wrap:wrap;justify-content:center;margin:.8rem 0}
.main{flex:1;max-width:1100px;margin:0 auto;width:100%;padding:0 .8rem 2rem}
.section-box{background:rgba(255,255,255,.02);border:1px solid rgba(201,168,76,.15);border-radius:12px;padding:.9rem;margin:.6rem 0}
.section-label{color:var(--gold);font-size:.8rem;margin-bottom:.55rem;font-family:'Cinzel',serif;letter-spacing:.05em}
.spread-selector{display:flex;flex-wrap:wrap;gap:.5rem;justify-content:center}
.spread-btn{padding:.45rem .9rem;border-radius:18px;border:1px solid rgba(201,168,76,.35);background:transparent;color:var(--muted);cursor:pointer;font-family:'Sarabun',sans-serif;font-size:.82rem;transition:all .25s}
.spread-btn.active,.spread-btn:hover{border-color:var(--gold);color:var(--gold);background:rgba(201,168,76,.1)}
.topic-grid{display:flex;flex-wrap:wrap;gap:.45rem;justify-content:center}
.topic-btn{padding:.35rem .8rem;border-radius:14px;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.04);color:var(--muted);cursor:pointer;font-family:'Sarabun',sans-serif;font-size:.8rem;transition:all .25s}
.topic-btn.sel-love{border-color:#e07070;color:#e07070;background:rgba(224,112,112,.1)}
.topic-btn.sel-career{border-color:#70a0e0;color:#70a0e0;background:rgba(112,160,224,.1)}
.topic-btn.sel-money{border-color:#70c070;color:#70c070;background:rgba(112,192,112,.1)}
.topic-btn.sel-spiritual{border-color:#c070e0;color:#c070e0;background:rgba(192,112,224,.1)}
.topic-btn.sel-free{border-color:var(--gold);color:var(--gold);background:rgba(201,168,76,.1)}
.topic-btn:not([class*="sel-"]):hover{border-color:rgba(255,255,255,.3);color:var(--text)}
.quick-q{display:flex;flex-wrap:wrap;gap:.35rem;margin-top:.4rem}
.quick-btn{padding:.28rem .6rem;border-radius:10px;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.03);color:var(--muted);cursor:pointer;font-family:'Sarabun',sans-serif;font-size:.75rem;transition:all .2s}
.quick-btn:hover{border-color:rgba(201,168,76,.4);color:var(--text)}
.q-input{width:100%;padding:.7rem .9rem;background:rgba(255,255,255,.04);border:1px solid rgba(201,168,76,.3);border-radius:9px;color:var(--text);font-family:'Sarabun',sans-serif;font-size:.9rem;resize:none}
.q-input:focus{outline:none;border-color:var(--gold)}
.q-input::placeholder{color:var(--muted)}
.deck-area{display:flex;flex-direction:column;align-items:center;gap:.6rem}
.deck-pile{position:relative;width:70px;height:112px;cursor:pointer}
.deck-pile .dc{position:absolute;width:70px;height:112px;border-radius:7px;border:1.5px solid var(--gold);overflow:hidden;transition:transform .2s}
.deck-pile .dc img{width:100%;height:100%;object-fit:cover}
.deck-pile:hover .dc:last-child{transform:translateY(-5px)}
.deck-label{color:var(--muted);font-size:.72rem;text-align:center}
.deck-remain{color:var(--gold);font-size:.78rem;font-weight:600}
@keyframes sh1{0%{transform:translate(0,0) rotate(0)}30%{transform:translate(-50px,-15px) rotate(-12deg)}60%{transform:translate(40px,-8px) rotate(8deg)}100%{transform:translate(0,0) rotate(0)}}
@keyframes sh2{0%{transform:translate(0,0) rotate(0)}30%{transform:translate(50px,8px) rotate(10deg)}60%{transform:translate(-40px,-12px) rotate(-7deg)}100%{transform:translate(0,0) rotate(0)}}
@keyframes sh3{0%{transform:translate(0,0) rotate(0)}30%{transform:translate(0,-25px) rotate(5deg)}60%{transform:translate(25px,8px) rotate(-10deg)}100%{transform:translate(0,0) rotate(0)}}
.shuffling .dc:nth-child(1){animation:sh1 .55s ease-in-out}
.shuffling .dc:nth-child(2){animation:sh2 .55s ease-in-out .08s}
.shuffling .dc:nth-child(3){animation:sh3 .55s ease-in-out .16s}
.shuffling .dc:nth-child(4){animation:sh1 .55s ease-in-out .05s reverse}
.shuffling .dc:nth-child(5){animation:sh2 .55s ease-in-out reverse}

/* ── Spread: zoom 1.5x (expands CSS box, no scrollbar) ── */
.spread-outer{display:flex;justify-content:center;padding:.5rem 0}
.spread-canvas{position:relative;zoom:1.5}

/* ── Card Slot ── */
.cslot{position:absolute;cursor:pointer}
.cslot-inner{width:70px;height:112px;border-radius:7px;border:1.5px dashed rgba(201,168,76,.35);display:flex;flex-direction:column;align-items:center;justify-content:center;transition:all .3s;background:rgba(255,255,255,.02);position:relative}
.cslot-inner.active{border:2px solid var(--gold);background:rgba(201,168,76,.12);box-shadow:0 0 16px rgba(201,168,76,.4);animation:slot-pulse .8s ease-in-out infinite}
@keyframes slot-pulse{0%,100%{box-shadow:0 0 16px rgba(201,168,76,.4)}50%{box-shadow:0 0 28px rgba(201,168,76,.7)}}
.cslot-inner.has-card{border:1.5px solid var(--gold)}
.cslot-inner.hover-empty:hover{border-color:rgba(201,168,76,.7);background:rgba(201,168,76,.07)}
.cslot-inner.rotate90{transform:rotate(90deg)}
.cslot-num{font-size:.65rem;color:rgba(201,168,76,.6);font-family:'Cinzel',serif}
.cslot-label{font-size:.6rem;color:var(--muted);text-align:center;padding:0 3px;line-height:1.2;margin-top:2px;max-width:66px;word-break:break-word;white-space:normal}
.cflip-wrap{width:70px;height:112px;perspective:500px;position:absolute;inset:0}
.cflip-inner{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform .65s cubic-bezier(.4,0,.2,1)}
.cflip-inner.flipped{transform:rotateY(180deg)}
.cface,.cback{position:absolute;inset:0;backface-visibility:hidden;border-radius:6px;overflow:hidden}
.cback img,.cface img{width:100%;height:100%;object-fit:cover}
.cface{transform:rotateY(180deg)}

/* ── Slot name label BELOW card: wrap + no overflow ── */
.cslot-name-label{
  position:absolute;
  top:116px;
  left:50%;
  transform:translateX(-50%);
  width:72px;
  font-size:.58rem;
  color:var(--gold);
  text-align:center;
  pointer-events:none;
  white-space:normal;
  word-break:break-word;
  line-height:1.3;
}

/* ── Flying card ── */
@keyframes fly-card{
  0%{opacity:1;transform:translate(0,0) scale(1)}
  45%{opacity:1;transform:translate(var(--fx),var(--fy)) scale(1.15)}
  100%{opacity:.1;transform:translate(var(--tx),var(--ty)) scale(var(--ts))}
}
.flying-card{position:fixed;z-index:9999;pointer-events:none;border-radius:7px;overflow:hidden;border:2px solid var(--gold2);box-shadow:0 0 20px rgba(201,168,76,.6);animation:fly-card .6s cubic-bezier(.4,0,.2,1) forwards}
.flying-card img{width:100%;height:100%;object-fit:cover}
.particle{position:fixed;pointer-events:none;border-radius:50%;animation:float-up linear forwards}
@keyframes float-up{0%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(-100px)}}

/* ── Reading ── */
.reading-box{background:rgba(45,27,78,.3);border:1px solid rgba(201,168,76,.2);border-radius:14px;padding:1.2rem;margin:.8rem 0;backdrop-filter:blur(4px)}
.reading-title{color:var(--gold);font-family:'Cinzel',serif;font-size:.95rem;text-align:center;margin-bottom:.9rem}
.reading-entry{display:flex;gap:.8rem;margin-bottom:1rem;padding-bottom:1rem;border-bottom:1px solid rgba(201,168,76,.1);align-items:flex-start}
.reading-entry:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0}
.rcard-thumb{width:55px;height:88px;object-fit:cover;border-radius:5px;border:1.5px solid var(--gold);flex-shrink:0}
.rcard-content{flex:1}
.reading-card-name{color:var(--gold2);font-weight:600;font-size:.88rem;margin-bottom:.2rem}
.reading-pos{color:var(--muted);font-size:.74rem;margin-bottom:.35rem}
.reading-text{font-size:.88rem;line-height:1.7}
.reading-summary{background:rgba(201,168,76,.07);border-left:3px solid var(--gold);padding:.7rem .9rem;border-radius:0 8px 8px 0;margin-top:.9rem;font-size:.88rem;line-height:1.7}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:200;display:flex;align-items:center;justify-content:center;padding:1rem}
.modal{background:linear-gradient(135deg,#1a0a2e,#2d1b4e);border:1px solid var(--gold);border-radius:14px;max-width:400px;width:100%;max-height:85vh;overflow-y:auto;padding:1.3rem}
.modal img{width:120px;height:192px;object-fit:cover;border-radius:9px;border:2px solid var(--gold);display:block;margin:0 auto .9rem}
.modal-name{color:var(--gold);font-family:'Cinzel',serif;font-size:1rem;text-align:center;margin-bottom:.25rem}
.modal-suit{color:var(--muted);font-size:.76rem;text-align:center;margin-bottom:.7rem}
.modal-meaning{font-size:.88rem;line-height:1.7}
.ldots{display:inline-flex;gap:3px;margin-left:4px}
.ldots span{width:5px;height:5px;border-radius:50%;background:var(--gold);animation:dbounce .55s ease-in-out infinite}
.ldots span:nth-child(2){animation-delay:.1s}.ldots span:nth-child(3){animation-delay:.2s}
@keyframes dbounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
.slot-progress{display:flex;gap:4px;justify-content:center;flex-wrap:wrap;margin:.4rem 0}
.sp-dot{width:8px;height:8px;border-radius:50%;border:1px solid var(--gold);background:transparent;transition:background .3s}
.sp-dot.filled{background:var(--gold)}.sp-dot.sp-active{background:rgba(201,168,76,.4);box-shadow:0 0 6px var(--gold)}
.hint-box{text-align:center;padding:.5rem;background:rgba(201,168,76,.06);border-radius:8px;font-size:.8rem;color:var(--muted);margin:.4rem 0}
.hint-box span{color:var(--gold)}
</style>
</head>
<body>
<div id="root"></div>

function getContextualMeaning(card,slotLabel,topic){
  const adapt=TOPIC_SUIT_ADAPT[topic]||{};
  const prefix=adapt[card.suit]||'';
  let m=(card.meaning_th||'').trim();
  if(m.endsWith('ค่ะ'))m=m.slice(0,-3).trim();
  let posCtx='';
  for(const[k,v] of Object.entries(POS_CONTEXTS)){if(slotLabel.includes(k)){posCtx=' '+v;break;}}
  if(!posCtx)posCtx='ค่ะ';
  let result=prefix+m+posCtx;
  if(card.reversed)result+=' อย่างไรก็ตาม ไพ่กลับหัวบ่งชี้ว่าพลังงานนี้อาจยังไม่เต็มที่หรือกำลังถูกท้าทายอยู่ค่ะ';
  return result;
}

function buildReading(spread,placed,topic,question){
  const entries=spread.slots.map(s=>{
    const c=placed[s.id];if(!c)return null;
    return{slotId:s.id,pos:s.label,name:(c.reversed?'🔄 ':'')+(c.name_th||c.name),
      img:c.img,isMajor:c.is_major,text:getContextualMeaning(c,s.label,topic)};
  }).filter(Boolean);
  const majors=entries.filter(e=>e.isMajor).length;
  const tn={love:'ความรัก',career:'การงาน',money:'การเงิน',spiritual:'จิตวิญญาณ',free:''}[topic]||'';
  let sum=`🌟 สรุปจากโซเฟีย${tn?'เกี่ยวกับ'+tn+'ของคุณ':''}ค่ะ — `;
  if(majors>=3)sum+=`ไพ่ Major Arcana ปรากฏถึง ${majors} ใบ บ่งบอกว่าช่วงนี้เป็นช่วงเปลี่ยนแปลงสำคัญในชีวิตค่ะ `;
  sum+='จักรวาลส่งพลังงานบวกให้คุณเสมอค่ะ จงเชื่อในตัวเองและก้าวต่อไปด้วยหัวใจที่มั่นคงค่ะ 💫';
  return{entries,summary:sum};
}

/* ── PDF export via Canvas 2D (Thai renders natively) ── */
function wrapText(ctx,text,maxW){
  const lines=[];
  const paragraphs=text.split('\n');
  for(const para of paragraphs){
    if(para.trim()===''){lines.push('');continue;}
    let line='';
    for(let i=0;i<para.length;i++){
      const t=line+para[i];
      if(ctx.measureText(t).width>maxW&&line){lines.push(line);line=para[i];}
      else line=t;
    }
    if(line)lines.push(line);
  }
  return lines;
}

/* ── Image loader: 3-method fallback (works on file:// + localhost) ── */
async function imgToBase64(src){
  const url=encodeURI(src); // encode spaces in paths like "Miner Arcana/..."

  // Method 1: fetch → blob → FileReader (best; data: URL won't taint canvas)
  try{
    const r=await fetch(url,{cache:'force-cache'});if(!r.ok)throw 0;
    const blob=await r.blob();
    return await new Promise((res,rej)=>{
      const fr=new FileReader();
      fr.onload=()=>res(fr.result);fr.onerror=rej;
      fr.readAsDataURL(blob);
    });
  }catch(_){}

  // Method 2: XHR arraybuffer → manual base64 (fallback for file://)
  const xhrResult = await new Promise(res=>{
    const xhr=new XMLHttpRequest();
    xhr.open('GET',url,true);xhr.responseType='arraybuffer';
    xhr.onload=function(){
      if(this.response&&this.response.byteLength>0){
        const bytes=new Uint8Array(this.response);
        let bin='';for(let i=0;i<bytes.length;i++)bin+=String.fromCharCode(bytes[i]);
        const ext=src.split('.').pop().toLowerCase();
        const mime=(ext==='jpg'||ext==='jpeg')?'image/jpeg':'image/png';
        res('data:'+mime+';base64,'+btoa(bin));
      }else res(null);
    };
    xhr.onerror=()=>res(null);
    try{xhr.send();}catch{res(null);}
  });
  if(xhrResult)return xhrResult;

  // Method 3: existing DOM img → isolated canvas (may taint, but try)
  const domImg=document.querySelector(`img[src="${src}"],img[src="${url}"]`);
  if(domImg&&domImg.complete&&domImg.naturalWidth>0){
    const tc=document.createElement('canvas');
    tc.width=domImg.naturalWidth;tc.height=domImg.naturalHeight;
    try{tc.getContext('2d').drawImage(domImg,0,0);return tc.toDataURL('image/jpeg',.82);}catch(_){}
  }
  return null;
}

async function b64ToImg(b64){
  if(!b64)return null;
  return new Promise(res=>{
    const i=new Image();i.onload=()=>res(i);i.onerror=()=>res(null);i.src=b64;
  });
}

async function exportPDF(spread,topic,question,placed,reading,aiText){
  const{jsPDF}=window.jspdf;
  const TOPIC_NAMES={love:'❤ ความรัก',career:'การงาน',money:'การเงิน',spiritual:'จิตวิญญาณ',free:'ถามอิสระ'};
  const now=new Date();
  const dateStr=now.toLocaleDateString('th-TH',{year:'numeric',month:'long',day:'numeric'});
  const fileDate=now.toISOString().slice(0,10);

  /* ── Single canvas, A4 portrait ── */
  const PW=794,PAD=36;
  const LINE=18,SM=14;

  // Measure total height needed first (dummy pass)
  const dummy=document.createElement('canvas');dummy.width=PW;dummy.height=100;
  const dx=dummy.getContext('2d');
  const contentW=PW-PAD*2-20;

  let totalH=PAD+30; // top
  totalH+=50; // title
  totalH+=22+18+18+12; // meta lines
  totalH+=10; // divider
  dx.font=`13px Sarabun,Arial,sans-serif`;
  const sumLines=wrapText(dx,reading.summary,contentW-20);
  if(topic==='free'&&aiText){
    // card names header
    totalH+=24+reading.entries.length*18+24;
    // ai text block
    const aiLines=wrapText(dx,aiText,contentW-10);
    totalH+=aiLines.length*LINE+30;
  } else {
    // standard table rows
    reading.entries.forEach(e=>{
      dx.font=`13px Sarabun,Arial,sans-serif`;
      const lines=wrapText(dx,e.text,contentW-260);
      totalH+=Math.max(lines.length*LINE+8,52)+10;
    });
    totalH+=20; // divider before summary
    totalH+=sumLines.length*LINE+50;
  }
  totalH+=PAD+20; // bottom

  const PH=Math.max(1123,totalH);

  /* ── Draw ── */
  const cv=document.createElement('canvas');cv.width=PW;cv.height=PH;
  const ctx=cv.getContext('2d');

  // Background

/* ── Gemini AI Integration (via backend proxy — key lives in Render env var) ── */
const GEMINI_MODELS=['gemini-2.5-flash','gemini-2.0-flash','gemini-1.5-flash']; // kept for reference

async function callGemini(entries, question) {
  const total = entries.length;
  const cardList = entries.map((e,i)=>
    `${i+1}. ตำแหน่ง "${e.pos}" → ไพ่: ${e.name}`
  ).join('\n');

  const prompt =
`คุณคือหมอดูไพ่ทาโรต์ชื่อ "โซเฟีย" ตอบเป็นภาษาไทย โทนอ่อนโยน

คำถามของผู้ถาม: "${question}"

ไพ่ที่เปิดได้ทั้งหมด ${total} ใบ:
${cardList}

กรุณาตีความไพ่ทั้ง ${total} ใบนี้ **โดยรวม** เป็นคำทำนายเชิงสรุปภาพรวมค่ะ
- ไม่ต้องแยกตีความรายใบ
- ให้สรุปเป็น 1 ย่อหน้า (4-6 ประโยค) ที่ตอบคำถาม "${question}" โดยตรง
- นำพลังงานและความหมายของไพ่แต่ละใบมาผสานเป็นเรื่องเดียว
- โทนอ่อนโยน ให้กำลังใจ ลงท้ายด้วย "ค่ะ"`;

  // Try each model in order, with 1 retry on 503/overload
  const res=await fetch('/api/gemini',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      contents:[{parts:[{text:prompt}]}],
      generationConfig:{temperature:0.85,maxOutputTokens:3000}
    })
  });
  if(!res.ok){
    const err=await res.json().catch(()=>({}));
    throw new Error(err.detail||`HTTP ${res.status}`);
  }
  const data=await res.json();
  const text=data?.text||'';
  if(!text) throw new Error('ไม่ได้รับคำตอบจาก AI ค่ะ');
  return text;
}

/* ── SofiaMedia: starts muted, unmutes on first interaction ── */
function SofiaMedia({phase}){
  const vRef=useRef(null);
  const[vOk,setVOk]=useState(false);
  const[muted,setMuted]=useState(true);
  const src=PHASE_VIDEO[phase]||'Asset/vdo/video_01_welcome.mp4';

  // Unmute after first user interaction
  useEffect(()=>{
    const handler=()=>{
      setMuted(false);
      if(vRef.current){vRef.current.muted=false;vRef.current.play().catch(()=>{});}
    };
    document.addEventListener('click',handler,{once:true});
    document.addEventListener('touchstart',handler,{once:true});
    return()=>{document.removeEventListener('click',handler);document.removeEventListener('touchstart',handler)};
  },[]);

  useEffect(()=>{
    setVOk(false);const v=vRef.current;if(!v)return;
    v.src=src;v.muted=muted;v.load();
    const ok=()=>setVOk(true),err=()=>setVOk(false);
    v.addEventListener('canplay',ok);v.addEventListener('error',err);
    return()=>{v.removeEventListener('canplay',ok);v.removeEventListener('error',err)};
  },[src]);

  return React.createElement('div',null,
    React.createElement('div',{style:{position:'relative',width:240,height:324}},
      React.createElement('video',{ref:vRef,autoPlay:true,loop:true,muted:true,playsInline:true,
        className:'sofia-media',style:{display:vOk?'block':'none'}}),
      React.createElement('img',{className:'sofia-media',src:'Asset/img/Master.png',alt:'Sofia',
        style:{display:vOk?'none':'block'}})

    },'🔊 เปิดเสียงวิดีโอ')
  );
}

    style:{left:slot.x,top:slot.y,zIndex:zIndex||1},

    }

    React.createElement('div',{className:innerCls},
      !hasCard&&React.createElement(React.Fragment,null,

        React.createElement('div',{className:'cflip-inner'+(isFlipped?' flipped':'')},
          React.createElement('div',{className:'cback'},React.createElement('img',{src:'Asset/img/BACK_CARD.png',alt:''})),
          React.createElement('div',{className:'cface'},React.createElement('img',{src:card.img,alt:card.name,onError:e=>{e.target.style.display='none'}}))
        )
      )
    ),
    React.createElement('div',{className:'cslot-name-label'},
      isFlipped&&card?(card.name_th||card.name):slot.label)
  );
}

function SpreadLayout({spreadDef,placed,activeSlot,flipped,onClickSlot,onFlipCard,slotRefs}){
  const getZ=(s)=>{
    if(spreadDef.id==='celtic'){
      if(s.id===0)return placed[0]?2:12;
      if(s.id===1)return placed[0]?15:3;
    }
    return activeSlot===s.id?10:(s.rotate===90?5:1);
  };
  return React.createElement('div',{className:'spread-outer'},
    React.createElement('div',{className:'spread-canvas',
      style:{width:spreadDef.W,height:spreadDef.H+60,position:'relative'}},
      spreadDef.slots.map(s=>
        React.createElement(CardSlot,{key:s.id,slot:s,card:placed[s.id]||null,
          isActive:activeSlot===s.id,isFlipped:flipped.has(s.id),zIndex:getZ(s),
          onClickSlot,onFlipCard,slotRef:el=>{if(slotRefs)slotRefs.current[s.id]=el}})
      )
    )
  );
}

function DeckPile({remain,shuffleAnim,onShuffle,onDraw,canDraw,deckRef}){
  return React.createElement('div',{className:'deck-area'},
    React.createElement('div',{className:'deck-pile'+(shuffleAnim?' shuffling':''),ref:deckRef,
      onClick:canDraw?onDraw:onShuffle,title:canDraw?'คลิกจั่วไพ่':'คลิกสับไพ่'},
      [0,1,2,3,4].map(i=>React.createElement('div',{key:i,className:'dc',
        style:{top:i*1.5+'px',left:i+'px',zIndex:i}},
        React.createElement('img',{src:'Asset/img/BACK_CARD.png',alt:''})))),
    React.createElement('div',{className:'deck-label'},canDraw?'👆 คลิกจั่วไพ่':'👆 คลิกสับไพ่'),
    React.createElement('div',{className:'deck-remain'},`เหลือ ${remain} ใบ`)
  );
}

function App(){
  const[phase,setPhase]=useState('welcome');
  const[spreadId,setSpreadId]=useState('three');
  const[topic,setTopic]=useState('free');
  const[question,setQuestion]=useState('');
  const[deck,setDeck]=useState([]);
  const[deckIdx,setDeckIdx]=useState(0);
  const[placed,setPlaced]=useState({});
  const[activeSlot,setActiveSlot]=useState(null);
  const[flipped,setFlipped]=useState(new Set());
  const[flying,setFlying]=useState(null);
  const[shuffleAnim,setShuffleAnim]=useState(false);
  const[shuffleCount,setShuffleCount]=useState(0);
  const[sofiaMsg,setSofiaMsg]=useState(SOFIA_MSGS.welcome);
  const[reading,setReading]=useState(null);
  const[modalCard,setModalCard]=useState(null);
  const[genReading,setGenReading]=useState(false);
  const[pdfLoading,setPdfLoading]=useState(false);
  const[htmlLoading,setHtmlLoading]=useState(false);
  const[autoPlacing,setAutoPlacing]=useState(false);
  const[aiInterp,setAiInterp]=useState(null);   // null | 'loading' | string
  const[aiError,setAiError]=useState('');
  const[aiRetry,setAiRetry]=useState(0);

  const spread=SPREAD_DEFS[spreadId];
  const deckRef=useRef(null);
  const slotRefs=useRef({});

  const setSofia=(msg,voice)=>{setSofiaMsg(msg);if(voice)playVoice(voice);};
  const allPlaced=spread.slots.every(s=>placed[s.id]);
  const allFlipped=allPlaced&&spread.slots.every(s=>flipped.has(s.id));
  const placedCount=Object.keys(placed).length;

  useEffect(()=>{
    if(allFlipped&&!reading&&!genReading&&phase==='spread'){
      setGenReading(true);setSofia(SOFIA_MSGS.reading,'voice_05_reveal_start');
      setTimeout(()=>{
        const r=buildReading(spread,placed,topic,question);
        setReading(r);setPhase('reading');setGenReading(false);
        setSofia(SOFIA_MSGS.done,'voice_11_reading_summary');
      },800);
    }
  },[allFlipped,reading,genReading,phase]);

  // Auto-trigger Gemini when reading ready + topic is free
  useEffect(()=>{
    if(reading&&topic==='free'&&!aiInterp&&!aiError){
      setAiInterp('loading');
      setSofia('โซเฟียกำลังให้ AI ตีความตามคำถามของคุณค่ะ ✨');
      callGemini(reading.entries,question)
        .then(text=>{setAiInterp(text);setSofia('AI ตีความเสร็จแล้วค่ะ 🌟','voice_11_reading_summary');})
        .catch(e=>{setAiError('เกิดข้อผิดพลาด: '+e.message);setAiInterp(null);});
    }
  },[reading,aiRetry]);

  useEffect(()=>{
    if(allPlaced&&!allFlipped&&phase==='spread'&&!reading)
      setSofia(SOFIA_MSGS.allPlaced,'voice_04_laying_cards');
  },[allPlaced]);

  const doShuffle=()=>{
    setShuffleAnim(true);setSofia(SOFIA_MSGS.shuffle,'voice_03_shuffling');
    setShuffleCount(c=>c+1);
    setTimeout(()=>{setDeck(shuffleArr(deck.length?deck:buildDeck()));setShuffleAnim(false);},600);
  };

  const startSpread=()=>{
    if(!deck.length)setDeck(buildDeck());
    setPlaced({});setFlipped(new Set());setActiveSlot(null);setReading(null);setDeckIdx(0);
    setPhase('spread');setSofia(SOFIA_MSGS.selectSlot,'voice_04_laying_cards');
  };

  const handleClickSlot=(slotId,mode)=>{
    if(mode==='detail'){setModalCard(placed[slotId]);return;}
    if(placed[slotId])return;
    setActiveSlot(slotId);
    const s=spread.slots.find(x=>x.id===slotId);
    if(s?.voice)setSofia(`ตำแหน่ง ${slotId+1}: ${s.label} — คลิกกองไพ่เพื่อวางค่ะ ✨`,s.voice);
  };

  const handleFlipCard=(slotId)=>{
    if(!placed[slotId])return;
    burst(window.innerWidth/2,window.innerHeight/3);
    setFlipped(f=>{const n=new Set(f);n.add(slotId);return n;});
  };

  const handleFlipAll=()=>{
    setFlipped(new Set(spread.slots.map(s=>s.id)));
    burst(window.innerWidth/2,window.innerHeight/3);
    setSofia(SOFIA_MSGS.reading,'voice_05_reveal_start');
  };

  const handleClickDeck=()=>{
    if(flying||autoPlacing)return;
    if(activeSlot===null){setSofia(SOFIA_MSGS.selectSlot);return;}
    if(placed[activeSlot]){setSofia('ตำแหน่งนี้มีไพ่แล้วค่ะ เลือก slot อื่นได้นะคะ 🎴');setActiveSlot(null);return;}
    const d=deck.length?deck:buildDeck();
    const card=d[deckIdx];
    if(!card)return;
    const deckEl=deckRef.current,slotEl=slotRefs.current[activeSlot];
    if(!deckEl||!slotEl)return;
    setFlying({card,slotId:activeSlot,fromRect:deckEl.getBoundingClientRect(),toRect:slotEl.getBoundingClientRect()});
    setDeckIdx(i=>i+1);setActiveSlot(null);
  };

  const onFlyDone=()=>{
    if(!flying)return;
    const cb=flying.cb;
    setPlaced(p=>({...p,[flying.slotId]:flying.card}));
    setFlying(null);
    if(cb)setTimeout(cb,250);
    else{const rem=spread.slots.filter(s=>!placed[s.id]&&s.id!==flying.slotId).length;
      if(rem>0)setSofia(`วางไพ่แล้ว ${placedCount+1}/${spread.count} ใบค่ะ ✨`);}
  }
  const handleAutoPlace=()=>{
    if(autoPlacing)return;
    const empties=spread.slots.filter(s=>!placed[s.id]).map(s=>s.id);
    if(!empties.length)return;
    setAutoPlacing(true);setSofia('วางไพ่อัตโนมัติค่ะ ✨','voice_04_laying_cards');
    const d=deck.length?deck:buildDeck();
    const startIdx=deckIdx;
    const go=(i)=>{
      if(i>=empties.length){setAutoPlacing(false);setDeckIdx(startIdx+i);return;}
      const slotId=empties[i];
      const card=d[startIdx+i];
      if(!card){setAutoPlacing(false);return;}
      const deckEl=deckRef.current,slotEl=slotRefs.current[slotId];
      if(!deckEl||!slotEl){go(i+1);return;}
      setTimeout(()=>{
        setFlying({card,slotId,fromRect:deckEl.getBoundingClientRect(),toRect:slotEl.getBoundingClientRect(),cb:()=>go(i+1)});
      },350);
    };
    go(0);
  };

  const handleExportPDF=async()=>{
    if(pdfLoading)return;
    setPdfLoading(true);setSofia('กำลังสร้าง PDF ค่ะ รอสักครู่นะคะ 📄','voice_14_export_pdf');
    const aiText=(topic==='free'&&aiInterp&&aiInterp!=='loading')?aiInterp:null;
    try{await exportPDF(spread,topic,question,placed,reading,aiText);}
    catch(e){console.error(e);}
    finally{setPdfLoading(false);}
  };

</style></head><body>
<h1>🔮 Sofia Tarot — คำทำนาย${useAI?'<span class="ai-badge">AI Gemini</span>':''}</h1>
<div class="sub">${spread.name} &nbsp;|&nbsp; ${TOPIC_NAMES[topic]||topic} &nbsp;|&nbsp; ${dateStr}<br>คำถาม: "${question}"</div>
<div class="divider"></div>
${useAI?`
<div>${cardHeaders}</div>
<div class="divider"></div>
<div class="ai-block">
  <div class="ai-title">✦ คำทำนายจาก AI ตามคำถามของคุณ</div>${(aiInterp||'').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
</div>`:`
<table>
  <thead><tr><th>ตำแหน่ง</th><th>ไพ่</th><th>คำทำนาย</th></tr></thead>
  <tbody>${cardRows}</tbody>
</table>
<div class="divider"></div>
<div class="summary">
  <div class="summary-title">✦ สรุปภาพรวม</div>
  ${reading.summary.replace(/\n/g,'<br>')}
</div>`}
<div class="footer">Sofia Tarot · สร้างเมื่อ ${dateStr}</div>
</body></html>`;
      const blob=new Blob([html],{type:'text/html;charset=utf-8'});
      const a=document.createElement('a');
      a.href=URL.createObjectURL(blob);
      a.download=`Sofia_Tarot_${fileDate}.html`;
      document.body.appendChild(a);a.click();
      setTimeout(()=>{URL.revokeObjectURL(a.href);document.body.removeChild(a);},2000);
    }catch(e){console.error(e);}
    finally{setHtmlLoading(false);}
  };

  const handleAskAI=async()=>{
    if(!reading||aiInterp==='loading')return;
    setAiInterp('loading');setAiError('');
    setSofia('โซเฟียกำลังถามพลังจักรวาลผ่าน AI ให้คุณค่ะ ✨');
    try{
      const text=await callGemini(reading.entries,question);
      setAiInterp(text);
      setSofia('AI ตีความเสร็จแล้วค่ะ 🌟','voice_11_reading_summary');
    }catch(e){
      setAiError('เกิดข้อผิดพลาด: '+e.message);
      setAiInterp(null);
      setSofia('ขอโทษค่ะ เชื่อมต่อ AI ไม่ได้ในขณะนี้ 🙏');

          React.createElement('div',{className:'section-label'},'✦ เลือกรูปแบบการทำนาย'),

              React.createElement('button',{key:sp.id,className:'spread-btn'+(spreadId===sp.id?' active':''),

          React.createElement('div',{className:'section-box'},
            React.createElement('div',{className:'section-label'},'✦ หัวข้อที่ต้องการทำนาย'),
            React.createElement('div',{className:'topic-grid'},
              TOPICS.map(t=>React.createElement('button',{key:t.id,
                className:'topic-btn'+(topic===t.id?' '+t.cls:''),
                onClick:()=>{setTopic(t.id);setPhase('question');setSofia(SOFIA_MSGS.question);}

      phase==='shuffle'&&React.createElement('div',null,
        React.createElement('div',{className:'section-box',style:{textAlign:'center'}},

        React.createElement('div',{className:'action-row'},
          React.createElement('button',{className:'btn',onClick:()=>setPhase('question')},'← กลับ'),

      (phase==='spread'||phase==='reading')&&React.createElement('div',null,
